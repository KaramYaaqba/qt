version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Mount model directory for easy model updates
      - ./backend/model:/app/model
      # Mount data directory
      - ./backend/app/data:/app/app/data
    environment:
      - USE_MOCK=true  # Set to false when real model is ready
      - DEBUG=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

# For development with hot reload
  # backend-dev:
